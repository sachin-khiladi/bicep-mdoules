name: Bicep CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (for az bicep tooling)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Bicep CLI
        run: az bicep install

      - name: Gather Bicep files
        id: files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find . -type f -name '*.bicep' | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No bicep files found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${FILES[@]}" > /tmp/bicep_files.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Format check
        if: steps.files.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            echo "Checking format: ${file}"
            tmp_file="$(mktemp)"
            az bicep format --file "${file}" --outfile "${tmp_file}"
            if ! cmp -s "${file}" "${tmp_file}"; then
              rm -f "${tmp_file}"
              echo "Formatting mismatch: ${file}"
              exit 1
            fi
            rm -f "${tmp_file}"
          done < /tmp/bicep_files.txt

      - name: Lint check
        if: steps.files.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            echo "Linting: ${file}"
            az bicep lint --file "${file}"
          done < /tmp/bicep_files.txt

      - name: Build validation
        if: steps.files.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r file; do
            echo "Building: ${file}"
            az bicep build --file "${file}" >/dev/null
          done < /tmp/bicep_files.txt
