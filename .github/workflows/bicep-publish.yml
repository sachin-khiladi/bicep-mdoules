name: Publish Bicep Module

on:
  push:
    # branches:
    #   - main
    paths:
      - '.github/workflows/bicep-publish.yml'

concurrency:
  group: bicep-module-publish
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  publish-storage-module:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next semantic version tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          LAST_TAG="$(git tag -l 'v*.*.*' --sort=-v:refname | head -n 1)"

          if [[ -z "${LAST_TAG}" ]]; then
            NEW_TAG="v0.1.0"
          else
            BASE="${LAST_TAG#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE}"
            if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" ]]; then
              echo "Latest tag format is invalid: ${LAST_TAG}"
              exit 1
            fi
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          if git rev-parse "${NEW_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${NEW_TAG}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${NEW_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Bicep CLI
        run: az bicep install

      - name: Validate ACR name input
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.ACR_NAME }}" ]]; then
            echo "ACR_NAME secret is required"
            exit 1
          fi

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ secrets.ACR_NAME }}"

      - name: Publish storage module to ACR OCI registry
        shell: bash
        run: |
          set -euo pipefail
          TARGET="br:${{ secrets.ACR_NAME }}.azurecr.io/bicep/modules/storage:${{ steps.version.outputs.version }}"
          echo "Using release tag ${{ steps.version.outputs.tag }}"
          echo "Publishing to ${TARGET}"
          az bicep publish \
            --file modules/storage/main.bicep \
            --target "${TARGET}"
